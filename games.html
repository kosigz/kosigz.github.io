<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground — Kosigz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('justsky.png');
      background-size: cover;
      background-position: center top;
      z-index: -2;
    }

    #sky-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-color: transparent;
      transition: background-color 3s ease;
      -webkit-mask-image: linear-gradient(to bottom, transparent 55%, black 100%);
      mask-image: linear-gradient(to bottom, transparent 55%, black 100%);
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 60px;
    }

    .back-link {
      align-self: flex-start;
      color: rgba(20, 20, 20, 0.65);
      text-decoration: none;
      font-family: 'Cabin Sketch', cursive;
      font-size: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.5; }

    h1 {
      font-family: 'Cabin Sketch', cursive;
      font-size: 32px;
      color: #1a1a1a;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 580px;
    }

    .card {
      background: rgba(255, 255, 255, 0.32);
      border-radius: 20px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,0.12));
      transition: transform 0.25s ease, filter 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card:hover {
      transform: translateY(-5px);
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.18));
    }

    .card-icon {
      font-size: 28px;
      color: #7ab648;
      margin-bottom: 4px;
    }
    .card-title {
      font-family: 'Cabin Sketch', cursive;
      font-size: 22px;
      color: #1a1a1a;
    }
    .card-desc {
      font-family: 'Cabin Sketch', cursive;
      font-size: 13px;
      color: rgba(20,20,20,0.6);
      line-height: 1.55;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div id="sky-overlay"></div>

  <div class="page">
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> back</a>
    <h1>Playground</h1>
    <div class="grid">
      <a href="ski.html" class="card">
        <div class="card-icon"><i class="fa-solid fa-person-skiing"></i></div>
        <div class="card-title">Ski Run</div>
        <div class="card-desc">Dodge trees and rocks. Collect iced coffees for a speed boost.</div>
      </a>
      <a href="flux.html" class="card">
        <div class="card-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <div class="card-title">Flux</div>
        <div class="card-desc">A living canvas driven by Perlin noise. Move to disturb. Click to release.</div>
      </a>
    </div>
  </div>

  <script>
    (function() {
      const overlay = document.getElementById('sky-overlay');
      function applyHour(h) {
        let color;
        if      (h <  5.0) color = 'rgba(4, 7, 32, 0.88)';
        else if (h <  6.5) color = 'rgba(55, 12, 85, 0.78)';
        else if (h <  8.0) color = 'rgba(230, 75, 15, 0.82)';
        else if (h < 17.0) color = 'rgba(0, 0, 0, 0)';
        else if (h < 18.5) color = 'rgba(255, 115, 0, 0.78)';
        else if (h < 20.0) color = 'rgba(185, 25, 55, 0.85)';
        else if (h < 21.5) color = 'rgba(35, 10, 65, 0.72)';
        else               color = 'rgba(4, 7, 32, 0.85)';
        overlay.style.backgroundColor = color;
      }
      const now = new Date();
      applyHour(now.getHours() + now.getMinutes() / 60);
      setInterval(() => {
        const n = new Date();
        applyHour(n.getHours() + n.getMinutes() / 60);
      }, 60000);
    })();
  </script>

</body>
</html>
