<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux — Kosigz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050814; }
    canvas { display: block; }

    #back {
      position: fixed;
      top: 18px;
      left: 18px;
      font-family: 'Cabin Sketch', cursive;
      font-size: 14px;
      color: rgba(255,255,255,0.28);
      text-decoration: none;
      z-index: 10;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.7); }

    #label {
      position: fixed;
      top: 16px;
      right: 20px;
      font-family: 'Cabin Sketch', cursive;
      font-size: 14px;
      color: rgba(255,255,255,0.18);
      text-align: right;
      line-height: 1.6;
      pointer-events: none;
      user-select: none;
    }
    #label span {
      font-size: 11px;
      color: rgba(255,255,255,0.1);
    }

    #hint {
      position: fixed;
      bottom: 22px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Cabin Sketch', cursive;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      transition: opacity 2.5s ease;
    }
  </style>
</head>
<body>

  <a href="games.html" id="back">← back</a>
  <div id="label">Flux<br><span>move to disturb · click to release</span></div>
  <canvas id="canvas"></canvas>
  <div id="hint">move to disturb · click to release</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, t = 0;
    let mx = -9999, my = -9999;

    // ── Perlin noise (2D) ─────────────────────────────────────────────────
    const _p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) _p[i] = i;
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [_p[i], _p[j]] = [_p[j], _p[i]];
    }
    const perm = new Uint8Array(512);
    for (let i = 0; i < 512; i++) perm[i] = _p[i & 255];

    function fade(t) { return t * t * t * (t * (6*t - 15) + 10); }
    function lerp(a, b, t) { return a + t * (b - a); }
    function grad(h, x, y) {
      switch (h & 3) {
        case 0: return  x + y;
        case 1: return -x + y;
        case 2: return  x - y;
        case 3: return -x - y;
      }
    }
    function noise(x, y) {
      const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
      const xf = x - Math.floor(x),  yf = y - Math.floor(y);
      const u = fade(xf), v = fade(yf);
      const aa = perm[perm[xi]   + yi],   ab = perm[perm[xi]   + yi+1];
      const ba = perm[perm[xi+1] + yi],   bb = perm[perm[xi+1] + yi+1];
      return lerp(
        lerp(grad(aa, xf,   yf),   grad(ba, xf-1, yf),   u),
        lerp(grad(ab, xf,   yf-1), grad(bb, xf-1, yf-1), u),
        v
      );
    }

    // ── Particles ─────────────────────────────────────────────────────────
    const SCALE = 0.0028;
    const SPEED = 1.5;
    const COUNT = 650;

    class Particle {
      constructor(x, y, h) {
        this.reset(x, y, h);
      }
      reset(x, y, h) {
        this.x  = this.px = (x !== undefined) ? x : Math.random() * W;
        this.y  = this.py = (y !== undefined) ? y : Math.random() * H;
        this.age    = 0;
        this.maxAge = 130 + Math.random() * 230;
        this.hue    = (h !== undefined) ? h : Math.random() * 360;
        this.speed  = SPEED * (0.65 + Math.random() * 0.75);
      }
      step() {
        this.age++;
        if (this.age >= this.maxAge) { this.reset(); return; }

        // Two-octave flow field
        const nx = this.x * SCALE;
        const ny = this.y * SCALE;
        const a1 = noise(nx       + t * 0.55, ny       + t * 0.40) * Math.PI * 4;
        const a2 = noise(nx * 2.2 + t * 0.28 + 5.2, ny * 2.2 + t * 0.22 + 1.9) * Math.PI * 2;
        const angle = a1 + a2 * 0.42;

        // Mouse attraction
        const dx = mx - this.x, dy = my - this.y;
        const d  = Math.hypot(dx, dy);
        let bx = 0, by = 0;
        if (d < 190 && d > 1) {
          const f = (1 - d / 190) * 1.7;
          bx = dx / d * f;
          by = dy / d * f;
        }

        this.px = this.x;
        this.py = this.y;
        this.x += Math.cos(angle) * this.speed + bx;
        this.y += Math.sin(angle) * this.speed + by;

        // Wrap edges
        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;
      }
      draw() {
        const jumped = Math.abs(this.x - this.px) > 50 || Math.abs(this.y - this.py) > 50;
        if (jumped) return;

        const t0 = Math.min(this.age / 28, 1);
        const t1 = Math.min((this.maxAge - this.age) / 28, 1);
        const alpha = t0 * t1 * 0.68;

        const h = (this.hue + this.age * 0.38 + t * 20) % 360;
        ctx.beginPath();
        ctx.moveTo(this.px, this.py);
        ctx.lineTo(this.x, this.y);
        ctx.strokeStyle = `hsla(${h|0},78%,65%,${alpha.toFixed(3)})`;
        ctx.stroke();
      }
    }

    const particles = [];
    const pendingBurst = [];

    function init() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      ctx.fillStyle = '#050814';
      ctx.fillRect(0, 0, W, H);
      if (particles.length === 0) {
        for (let i = 0; i < COUNT; i++) particles.push(new Particle());
      }
    }

    function burst(bx, by) {
      for (let n = 0; n < 55; n++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 75;
        pendingBurst.push([bx + Math.cos(a)*r, by + Math.sin(a)*r, 180 + Math.random() * 200]);
      }
    }

    // ── Render loop ───────────────────────────────────────────────────────
    function frame() {
      // Slow fade — long luminous trails
      ctx.fillStyle = 'rgba(5, 8, 20, 0.033)';
      ctx.fillRect(0, 0, W, H);

      t += 0.00065;

      ctx.lineWidth = 1;
      ctx.lineCap   = 'round';

      // Inject burst particles by replacing the most-aged ones
      while (pendingBurst.length) {
        const [bx, by, bh] = pendingBurst.pop();
        let oldest = 0, maxA = 0;
        for (let i = 0; i < COUNT; i++) {
          if (particles[i].age > maxA) { maxA = particles[i].age; oldest = i; }
        }
        particles[oldest].reset(bx, by, bh);
        particles[oldest].speed = SPEED * (1.25 + Math.random() * 0.75);
      }

      for (const p of particles) {
        p.step();
        p.draw();
      }

      requestAnimationFrame(frame);
    }

    // ── Events ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    });

    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    window.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });
    window.addEventListener('click', e => burst(e.clientX, e.clientY));

    window.addEventListener('touchmove', e => {
      e.preventDefault();
      mx = e.touches[0].clientX;
      my = e.touches[0].clientY;
    }, { passive: false });
    window.addEventListener('touchstart', e => burst(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchend', () => { mx = -9999; my = -9999; });

    // Fade the hint after a few seconds
    setTimeout(() => {
      const hint = document.getElementById('hint');
      if (hint) hint.style.opacity = '0';
    }, 4500);

    init();
    frame();
  </script>

</body>
</html>
